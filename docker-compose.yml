services:
  mysql:
    image: mysql:8.4
    container_name: haill-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: haill
      MYSQL_USER: haill
      MYSQL_PASSWORD: haill123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - haill-mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  haill-mysql-data:
